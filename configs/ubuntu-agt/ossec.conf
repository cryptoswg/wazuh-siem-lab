<!--
  Wazuh Agent — ossec.conf
  Агент: ubuntu-agt (192.168.212.20)
  Показаны только релевантные для проекта секции.
-->

<ossec_config>
  <!-- Сбор логов Suricata для сетевой детекции -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
  </localfile>

  <!-- Сбор событий auditd (execve syscalls) для детекции подозрительных процессов -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>
</ossec_config>
