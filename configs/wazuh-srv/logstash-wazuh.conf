# Logstash pipeline — wazuh.conf
# Сервер: wazuh-srv
# Путь: /etc/logstash/wazuh.conf
#
# Читает alerts.json от Wazuh Manager и отправляет в wazuh-indexer (OpenSearch).
# Использует logstash-output-opensearch вместо Filebeat,
# так как Filebeat несовместим с OpenSearch 2.x (устаревший _type в Bulk API).

input {
  file {
    path => "/var/ossec/logs/alerts/alerts.json"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb_wazuh"
    codec => "json"
  }
}

filter {
  # Критично: поле "host" конфликтует с маппингом индекса OpenSearch
  # и вызывает mapper_parsing_exception без этого удаления
  mutate {
    remove_field => ["host"]
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  opensearch {
    hosts => ["https://localhost:9200"]
    user => "admin"
    password => "${OPENSEARCH_PASSWORD}"
    ssl => true
    ssl_certificate_verification => false
    index => "wazuh-alerts-4.x-%{+YYYY.MM.dd}"
  }
}
