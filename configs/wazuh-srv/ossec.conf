<!--
  Wazuh Manager — ossec.conf
  Сервер: wazuh-srv (192.168.212.10)
  Показаны только релевантные для проекта секции.
  Полный файл содержит дополнительные дефолтные блоки Wazuh.
-->

<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
  </global>

  <!-- Active Response: автоблокировка IP при SSH brute-force -->
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>5763</rules_id>
    <timeout>300</timeout>
  </active-response>

  <!-- Чтение alerts.json для передачи в Logstash -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/alerts/alerts.json</location>
  </localfile>

</ossec_config>
