<!--
  Wazuh Manager — shared agent configuration
  File Integrity Monitoring для критических файлов (Сценарий D)
  Путь: /var/ossec/etc/shared/default/agent.conf
  Применяется ко всем агентам группы "default"
-->

<agent_config>
  <syscheck>
    <directories check_all="yes" report_changes="yes" realtime="yes">
      /etc/passwd,/etc/shadow,/etc/sudoers
    </directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">
      /root
    </directories>
  </syscheck>
</agent_config>
